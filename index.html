<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
      color: #333;
    }

    header {
      background-color: #222;
      color: white;
      padding: 20px 40px;
    }

    header h1 {
      margin: 0;
    }

    header p {
      margin: 5px 0 0;
      color: #ccc;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h2 {
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }

    a {
      color: #0077cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    video {
      width: 100%;
      border-radius: 6px;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Your Name</h1>
    <p>Technical Writer | Documentation | Samples</p>
  </header>

  <div class="container">

    <div class="card">
      <h2>📄 Documents</h2>
      <ul>
        <li>
          <a href="Documents/L_Marshall__Writing_Sample.pdf" target="_blank">
            Writing Sample (PDF)
          </a>
        </li>
      </ul>
    </div>

    <div class="card">
      <h2>🎬 Videos</h2>
      <video controls>
        <source src="videos/VoIP_Networking_Concepts.mp4" type="video/mp4">

      </video>

  </div>

  <footer>

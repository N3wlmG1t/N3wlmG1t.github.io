<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Files</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f6f8;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    header {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    h1 {
      margin: 0;
    }

    p {
      margin: 5px 0 0;
      color: #666;
    }

    .section {
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .btn:hover {
      background: #0056b3;
    }

    video {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <header>
    <h1>My Files</h1>
    <p>Documents and Videos</p>
  </header>

  <div class="section">
    <h2>Documents</h2>

    <div class="card">
      <strong>Writing Sample</strong><br>

      <!-- PDF Preview -->
      <iframe src="Documents/L_Marshall__Writing_Sample.pdf"></iframe>

      <a class="btn" href="Documents/L_Marshall__Writing_Sample.pdf" download>
        Download PDF
      </a>
    </div>
  </div>

  <div class="section">
    <h2>Videos</h2>

    <div class="card">
      <strong>VoIP Networking Concepts</strong>
      <video controls>
        <source src="videos/VoIP_Networking_Concepts.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

</div>

</body>
</html>

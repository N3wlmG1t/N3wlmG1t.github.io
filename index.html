<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Files</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: 50px auto;
      padding: 0 20px;
    }

    /* Header */
    .page-header {
      margin-bottom: 30px;
    }

    .page-header h1 {
      margin: 0;
      font-size: 32px;
    }

    .page-header p {
      margin-top: 6px;
      color: #666;
    }

    /* Project Card */
    .project-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      overflow: hidden;
      margin-bottom: 40px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.10);
    }

    .project-header {
      padding: 20px 25px;
      border-bottom: 1px solid #eee;
    }

    .project-title {
      font-size: 20px;
      margin: 0;
    }

    .project-subtitle {
      margin-top: 5px;
      color: #666;
      font-size: 14px;
    }

    /* Content layout */
    .project-content {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      padding: 20px;
    }

    /* PDF viewer */
    .pdf-frame {
      width: 100%;
      height: 500px;
      border: 1px solid #eee;
      border-radius: 10px;
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      transition: 0.2s;
    }

    .btn-primary {
      background: #007bff;
      color: white;
    }

    .btn-primary:hover {
      background: #0056b3;
    }

    .btn-secondary {
      background: #f1f1f1;
      color: #222;
    }

    .btn-secondary:hover {
      background: #e2e2e2;
    }

    /* Video card */
    .video {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #eee;
    }

    /* Section label */
    .section-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin: 40px 0 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="page-header">
    <h1>My Files</h1>
    <p>Selected documents and media projects</p>
  </div>

  <!-- DOCUMENT PROJECT -->
  <div class="project-card">

    <div class="project-header">
      <h2 class="project-title">Writing Sample</h2>
      <div class="project-subtitle">PDF document • Technical writing sample</div>
    </div>

    <div class="project-content">

      <!-- PDF preview (more reliable embed method) -->
      <object
        class="pdf-frame"
        data="Documents/L_Marshall__Writing_Sample.pdf"
        type="application/pdf">

        <p>
          PDF preview not available in this browser.
        </p>

      </object>

      <div class="actions">
        <a class="btn btn-primary"
           href="Documents/L_Marshall__Writing_Sample.pdf"
           target="_blank">
          View Full Screen
        </a>

        <a class="btn btn-secondary"
           href="Documents/L_Marshall__Writing_Sample.pdf"
           download>
          Download
        </a>
      </div>

    </div>
  </div>

  <!-- VIDEO PROJECT -->
  <div class="project-card">

    <div class="project-header">
      <h2 class="project-title">VoIP Networking Concepts</h2>
      <div class="project-subtitle">Video demonstration • Networking fundamentals</div>
    </div>

    <div class="project-content">

      <video class="video" controls>
        <source src="videos/VoIP_Networking_Concepts.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>

      <div class="actions">
        <a class="btn btn-secondary" href="videos/VoIP_Networking_Concepts.mp4" download>
          Download Video
        </a>
      </div>

    </div>
  </div>

</div>

</body>
</html>
